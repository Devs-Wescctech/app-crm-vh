services:
  app-salestwo:
    image: ghcr.io/devs-wescctech/app-crm-vh:latest
    container_name: app-salestwo
    restart: unless-stopped
    ports:
      - "5200:5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_SSL=false
    volumes:
      - ./uploads:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
