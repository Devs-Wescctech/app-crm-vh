version: '3.8'

services:
  app-salestwo:
    image: ghcr.io/devs-wescctech/app-crm-vh:latest
    container_name: app-salestwo
    restart: unless-stopped
    ports:
      - "5200:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=postgresql://auth_bd:4uth%401307BD@172.17.0.1:5432/salestwo
      - JWT_SECRET=2Iz5EHu2ZKRnebbtxV+R/e1JcPxjX/zcF68Xt5q/mXo=
      - SESSION_SECRET=2Iz5EHu2ZKRnebbtxV+R/e1JcPxjX/zcF68Xt5q/mXo=
      - DB_SSL=false
      - PUBLIC_URL=https://salestwo.wescctech.com.br
    volumes:
      - /var/www/html/app-salestwo/uploads:/app/uploads
    networks:
      - salestwo-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  salestwo-network:
    driver: bridge
